spring:
  application:
    name: authentication-service

  profiles:
    active: postgres

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: none          # Flyway manages schema
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production-must-be-at-least-256-bits-long-for-security}
  expiration: ${JWT_EXPIRATION:86400000}

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}

logging:
  level:
    com.example.authservice: DEBUG
    org.springframework.security: DEBUG

